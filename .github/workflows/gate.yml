# CI deploy gate (D-005, revised by D-008): no untested code reaches Fly prod.
# `test` must pass before `deploy` runs, and `test` is a REQUIRED status check via
# branch protection on main (require PR, no direct pushes, no admin bypass).
#
# paths-ignore was REMOVED (D-008): a required check must report on EVERY PR, or a
# doc-only PR never triggers the workflow and hangs unmergeable forever. The suite
# runs in ~20s, so docs pay a trivial always-green cost instead of deadlocking.
# When real Fly deploy is wired, guard the DEPLOY JOB (not the trigger) against
# doc-only changes so docs still run tests but don't redeploy.
name: gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      # D-013 (+ Amendment A): install the LOCK FILE, not the manifest. The lock pins
      # every transitive too, and --require-hashes makes pip refuse anything whose
      # artifact doesn't match — so the installed environment is a function of a
      # committed file. A red gate is therefore always attributable to a commit in
      # this repo, never to an upstream release.
      #
      # requirements-dev.lock is compiled FROM requirements-dev.txt, which includes
      # requirements.txt, so a broken RUNTIME pin still fails here rather than
      # surviving to deploy (D-005). Caching is deliberately OFF — D-013 §3.
      #
      # If this step fails, read IT and not the pytest output: install and test are
      # independently breakable.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-dev.lock
      - run: python -m pytest -q

  # D-017: the seam's other half. The `test` job builds schema with create_all and
  # never runs the migration chain, and SKIP LOCKED is a syntax error on SQLite — so
  # PostgresJobQueue.claim's atomicity and the Alembic chain are unproven there (the
  # JARVIS H2 shape). This job runs a real Postgres 16 (matching prod, D-014),
  # applies migrations with `alembic upgrade head` (NOT create_all), and runs the
  # @pytest.mark.postgres tests that exercise the real claim path.
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        # pgvector-enabled Postgres 16 (D-019): migration 0002 runs CREATE EXTENSION vector +
        # a vector(384) column, so the extension must be available. Stock postgres:16 has no
        # pgvector; this image bundles it. Matches prod (D-014: PG16 + pgvector v0.8.2).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pharmfold_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      # psycopg 3 driver (pinned, D-013). This is the DIRECT connection — DDL and
      # session-level work only (D-014); no pooler in CI.
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/pharmfold_test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-dev.lock
      - name: Apply migrations (alembic upgrade head — the real chain, NOT create_all)
        run: python -m alembic upgrade head
      - name: Postgres integration tests
        run: python -m pytest -m postgres -q

  # DEP-001…004: build the serving-tier image and release it to Fly. Stays `needs: [test,
  # postgres]` (both required, D-032) — it cannot run until the gate is green. The doc-only
  # guard is on the JOB, never the trigger (DEP-002): `test`/`postgres` still run on docs PRs,
  # only the deploy STEP is skipped when a push changed nothing outside docs/ and *.md.
  deploy:
    needs: [test, postgres]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0            # need history to diff the pushed range for the guard
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Doc-only guard (DEP-002)
        id: guard
        run: |
          before="${{ github.event.before }}"
          # first push / force-push can leave `before` unresolvable — fall back to HEAD~1.
          if ! git cat-file -e "${before}^{commit}" 2>/dev/null; then before="$(git rev-parse HEAD~1)"; fi
          changed="$(git diff --name-only "$before" "${{ github.sha }}")"
          echo "changed paths:"; echo "$changed"
          docs_only="$(printf '%s\n' "$changed" | python scripts/deploy_guard.py)"
          echo "docs_only=$docs_only"
          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"
      - name: Set up flyctl
        if: steps.guard.outputs.docs_only == 'false'
        uses: superfly/flyctl-actions/setup-flyctl@master
      # DEP-001 image, DEP-003 app-scoped token, DEP-004 meaning. --remote-only builds on Fly's
      # builders (no docker-in-CI). Requires the FLY_API_TOKEN secret (owner-provisioned, DEP-003).
      - name: Deploy to Fly
        if: steps.guard.outputs.docs_only == 'false'
        run: flyctl deploy --app pharmfoldmdk --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

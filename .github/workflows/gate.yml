# CI deploy gate (D-005, revised by D-008): no untested code reaches Fly prod.
# `test` must pass before `deploy` runs, and `test` is a REQUIRED status check via
# branch protection on main (require PR, no direct pushes, no admin bypass).
#
# paths-ignore was REMOVED (D-008): a required check must report on EVERY PR, or a
# doc-only PR never triggers the workflow and hangs unmergeable forever. The suite
# runs in ~20s, so docs pay a trivial always-green cost instead of deadlocking.
# When real Fly deploy is wired, guard the DEPLOY JOB (not the trigger) against
# doc-only changes so docs still run tests but don't redeploy.
name: gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      # D-013 (+ Amendment A): install the LOCK FILE, not the manifest. The lock pins
      # every transitive too, and --require-hashes makes pip refuse anything whose
      # artifact doesn't match — so the installed environment is a function of a
      # committed file. A red gate is therefore always attributable to a commit in
      # this repo, never to an upstream release.
      #
      # requirements-dev.lock is compiled FROM requirements-dev.txt, which includes
      # requirements.txt, so a broken RUNTIME pin still fails here rather than
      # surviving to deploy (D-005). Caching is deliberately OFF — D-013 §3.
      #
      # If this step fails, read IT and not the pytest output: install and test are
      # independently breakable.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes -r requirements-dev.lock
      - run: python -m pytest -q

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Placeholder only: real Fly deploy (flyctl + FLY_API_TOKEN secret) is
      # wired in a later decision once the application exists. No app code yet.
      - run: echo "gate passed; deploy placeholder (Fly wiring pending — docs/README.md D-005)"

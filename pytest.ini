[pytest]
# Put the repo root on sys.path so tests import production packages (`core`,
# and later `db`) as top-level modules. Test-support modules in tests/ (conftest,
# doubles) stay importable via pytest's prepend import mode. Requires pytest >= 7;
# the gate pins 9.1.1 (D-013).
pythonpath = .
markers =
    postgres: integration test needing a real PostgreSQL (D-017). Auto-SKIPS unless
        DATABASE_URL points at postgresql; runs for real only in the `postgres` CI job.

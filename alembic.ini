# Alembic config (D-012, D-014). Migrations target Postgres 16 (the MPG cluster,
# D-014); the SQLite test DB does NOT run this chain — tests build schema with
# create_all (D-005), so migration/model drift is a known gap closed only by the
# still-absent Postgres integration job (D-012 §5).
#
# The DB URL is intentionally NOT stored here. env.py reads it from the environment
# (DATABASE_URL), and per D-014 that must be the DIRECT connection string, never the
# transaction-mode pooler (which breaks DDL). The string lives in secrets, never in
# the repo.

[alembic]
script_location = db/migrations
prepend_sys_path = .
# sqlalchemy.url is supplied by env.py from $DATABASE_URL (left blank on purpose).
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
